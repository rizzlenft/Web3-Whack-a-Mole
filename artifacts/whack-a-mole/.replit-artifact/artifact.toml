kind = "web"
previewPath = "/"
title = "Web3 Whack-a-Mole"
version = "1.0.0"
id = "artifacts/whack-a-mole"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25002

[services.development]
run = "pnpm --filter @workspace/whack-a-mole run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/whack-a-mole", "run", "build" ]
publicDir = "artifacts/whack-a-mole/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25002"
BASE_PATH = "/"
